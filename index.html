<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gamers Zone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo">🎮 Gamers Zone</div>
    <nav>
        <a href="#">INICIO</a>
        <a href="#">JUEGOS</a>
        <a href="#">NOTICIAS</a>
        <a href="#">CONTACTOS</a>
    </nav>
    <div class="cart">🛒</div>
</header>

<main class="grid">

    <div class="card">
        <img src="img/gta5.jpg" alt="GTA 5">
        <h3>GTA 5</h3>
        <p>15 $</p>
        <button>COMPRAR</button>
    </div>

    <div class="card">
        <img src="img/lego.jpg" alt="Lego Batman">
        <h3>LEGO BATMAN</h3>
        <p>10 $</p>
        <button>COMPRAR</button>
    </div>

    <div class="card">
        <img src="img/spiderman.jpg" alt="Spiderman">
        <h3>SPIDERMAN</h3>
        <p>60 $</p>
        <button>COMPRAR</button>
    </div>

    <div class="card">
        <img src="img/minecraft.jpg" alt="Minecraft">
        <h3>MINECRAFT</h3>
        <p>20 $</p>
        <button>COMPRAR</button>
    </div>

    <div class="card">
        <img src="img/re7.jpg" alt="Resident Evil 7">
        <h3>RESIDENT EVIL 7</h3>
        <p>20 $</p>
        <button>COMPRAR</button>
    </div>

    <div class="card">
        <img src="img/gow.jpg" alt="God of War">
        <h3>GOD OF WAR</h3>
        <p>25 $</p>
        <button>COMPRAR</button>
    </div>

    <div class="card">
        <img src="img/cyberpunk.jpg" alt="Cyberpunk">
        <h3>CYBERPUNK 2077</h3>
        <p>25 $</p>
        <button>COMPRAR</button>
    </div>

    <div class="card">
        <img src="img/daysgone.jpg" alt="Days Gone">
        <h3>DAYS GONE</h3>
        <p>30 $</p>
        <button>COMPRAR</button>
    </div>

</main>

</body>
</html>
