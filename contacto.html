<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamersZone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="header">
        <div class="logo">🎮 GamersZone</div>
        <nav>
            <a href="inicio.html">INICIO</a>
            <a href="catalogo.html">JUEGOS</a>
            <a href="contacto.html">CONTACTOS</a>
        </nav>
        <div class="cart">🛒</div>
    </header>

    <section class="container">
        <div class="left">
            <h2>CONTACTANOS</h2>

            <p><strong>¿DÓNDE ENCONTRARNOS?</strong></p>
            <p>COMPLEJO EDUCATIVO CIT</p>

            <p><strong>FORMAS DE PAGO:</strong></p>
            <div class="pagos">
                <img src="https://img.icons8.com/color/48/visa.png" alt="Visa">
                <img src="https://img.icons8.com/color/48/mastercard.png" alt="Mastercard">
                <img src="https://img.icons8.com/color/48/paypal.png" alt="PayPal">
            </div>
        </div>

        <div class="right">
            <h2>NUESTRO CORREO</h2>
            <p>gamerszone@gmail.com</p>

            <div class="whatsapp">
                <p>📞 Whatsapp</p>
                <span>6208 5063</span>
            </div>
        </div>
    </section>

    <section class="formulario">
        <h2>Formulario de Opinión</h2>

        <form action="#" method="post">

            <label for="nombre">Nombre:</label><br>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="correo">Correo electrónico:</label><br>
            <input type="email" id="correo" name="correo" required><br><br>

            <label for="presupuesto">Presupuesto:</label><br>
            <input type="number" id="presupuesto" name="presupuesto" placeholder="Ej: 100" required><br><br>

            <label for="comentarios">Comentarios:</label><br>
            <textarea id="comentarios" name="comentarios" rows="5" cols="40" placeholder="Escribe los comentarios aquí" required></textarea><br><br>

            <button type="submit">Enviar</button>

        </form>
    </section>

    <footer>
        2026 TUEMPRESA. TODOS LOS DERECHOS RESERVADOS.
    </footer>

</body>
</html>
